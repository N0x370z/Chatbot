name: telegram-media-bot

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python main.py
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - incoming_data:/data/incoming
      - processed_data:/data/processed
    healthcheck:
      test: ["CMD", "python", "-c", "import bot"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python main_worker.py
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - incoming_data:/data/incoming
      - processed_data:/data/processed

volumes:
  incoming_data:
  processed_data:
